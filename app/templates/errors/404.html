{% extends "base.html" %}
{% block title %}404 Not Found{% endblock %}

{% block auth_content %}
<div class="auth-page">
  <div style="text-align:center">
    <div style="font-size:80px;font-weight:800;background:linear-gradient(135deg,#63b3ed,#9f7aea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1">404</div>
    <h1 style="font-size:22px;margin:12px 0 8px">Page Not Found</h1>
    <p style="color:var(--text-muted);margin-bottom:24px">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('dashboard.home') }}" class="btn btn-primary"><i class="fas fa-home"></i> Go to Dashboard</a>
  </div>
</div>
{% endblock %}
