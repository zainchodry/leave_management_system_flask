{% extends "base.html" %}
{% block title %}403 Forbidden{% endblock %}

{% block auth_content %}
<div class="auth-page">
  <div style="text-align:center">
    <div style="font-size:80px;font-weight:800;background:linear-gradient(135deg,#fc8181,#9f7aea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1">403</div>
    <h1 style="font-size:22px;margin:12px 0 8px">Access Forbidden</h1>
    <p style="color:var(--text-muted);margin-bottom:24px">You don't have permission to access this page.</p>
    <a href="{{ url_for('dashboard.home') }}" class="btn btn-primary"><i class="fas fa-home"></i> Go to Dashboard</a>
  </div>
</div>
{% endblock %}
